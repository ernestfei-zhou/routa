schema: harness-surface-v1
surface: build
title: 构建反馈环
summary: 把 package manager、workspace manifests 和发布目标压缩到一个 build view 里。
overview:
  - id: repository-shape
    label: Repository shape
    source: files
    paths:
      - package.json
      - pnpm-lock.yaml
      - package-lock.json
      - yarn.lock
      - Cargo.toml
      - apps/desktop/package.json
      - apps/desktop/src-tauri/Cargo.toml
    limit: 6
  - id: targets
    label: Targets
    source: derived
    rules:
      - label: Next.js web
        whenAny:
          - fileExists: next.config.ts
          - scriptNameMatches: "^dev$"
          - scriptNameMatches: "^build$"
      - label: Tauri desktop
        whenAny:
          - fileExists: apps/desktop/src-tauri/Cargo.toml
          - scriptNameMatches: "tauri"
          - scriptNameMatches: "desktop"
      - label: Docker image
        whenAny:
          - fileExists: Dockerfile
          - scriptNameMatches: "docker"
      - label: Static export
        whenAny:
          - scriptNameMatches: "static"
      - label: Rust workspace
        whenAny:
          - fileExists: Cargo.toml
          - fileExists: apps/desktop/src-tauri/Cargo.toml
  - id: config-evidence
    label: Config & evidence
    source: files
    paths:
      - next.config.ts
      - Dockerfile
      - docker-compose.yml
      - vercel.json
      - docs/fitness/README.md
    limit: 6
  - id: outputs
    label: Outputs
    source: files
    paths:
      - out
      - dist
      - target
    limit: 4
entrypointGroups:
  - id: dev
    label: Dev flow
    category: dev
    scriptNamePatterns:
      - "^dev$"
      - ".*:dev$"
      - "^start:desktop:.*"
      - "^docs:dev$"
  - id: build
    label: Build flow
    category: build
    scriptNamePatterns:
      - "^build$"
      - "^docs:build$"
      - "^storybook:build$"
  - id: bundle
    label: Bundle / release
    category: bundle
    scriptNamePatterns:
      - "^build:.*"
      - "^tauri:build$"
      - "^release:.*"
