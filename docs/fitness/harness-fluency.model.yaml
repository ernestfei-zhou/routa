version: 1
levels:
  - id: awareness
    name: Awareness
  - id: assisted_coding
    name: Assisted Coding
  - id: structured_ai_coding
    name: Structured AI Coding
  - id: agent_centric
    name: Agent-Centric
  - id: agent_first
    name: Agent-First

dimensions:
  - id: collaboration
    name: Human-AI Collaboration
  - id: sdlc
    name: SDLC Coverage
  - id: harness
    name: AI Engineering Harness
  - id: governance
    name: Governance & Quality
  - id: context
    name: Context Engineering

criteria:
  - id: collaboration.awareness.operating_contract
    level: awareness
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Agents need an explicit repository contract before collaboration can scale.
    recommended_action: Add or refresh AGENTS.md with routing and execution rules.
    evidence_hint: AGENTS.md
    detector:
      type: file_exists
      path: AGENTS.md
  - id: collaboration.awareness.ai_entrypoints
    level: awareness
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Awareness-level repos should still expose at least one visible AI entrypoint.
    recommended_action: Add a checked-in agent or skill entrypoint for contributors.
    evidence_hint: .claude/skills or .agents/skills
    detector:
      type: any_file_exists
      paths:
        - .claude/skills
        - .agents/skills

  - id: collaboration.assisted.specialist_templates
    level: assisted_coding
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Assisted coding is more repeatable when common agent roles are documented.
    recommended_action: Add reusable specialist templates for implementation or verification roles.
    evidence_hint: resources/specialists/core or resources/specialists/team
    detector:
      type: any_file_exists
      paths:
        - resources/specialists/core
        - resources/specialists/team
  - id: collaboration.assisted.agent_runner_entrypoint
    level: assisted_coding
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Assisted workflows need a concrete local runner, not just ad hoc prompts.
    recommended_action: Wire a checked-in CLI or script that launches agent execution.
    evidence_hint: package.json scripts.acp:runner
    detector:
      type: json_path_exists
      path: package.json
      jsonPath: [scripts, "acp:runner"]

  - id: collaboration.structured_ai_coding.issue_enricher_workflow
    level: structured_ai_coding
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Structured AI coding needs a durable issue-to-agent handoff path.
    recommended_action: Add workflow automation that enriches issues before agent execution.
    evidence_hint: .github/workflows/issue-enricher.yml
    detector:
      type: yaml_path_exists
      path: .github/workflows/issue-enricher.yml
      yamlPath: [jobs, enrich-issue, steps]
  - id: collaboration.structured_ai_coding.issue_specialist
    level: structured_ai_coding
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Structured handoff needs a specialist or routing definition to encode the collaboration contract.
    recommended_action: Add a reusable issue-enricher specialist definition.
    evidence_hint: resources/specialists/issue/issue-enricher.yaml
    detector:
      type: file_exists
      path: resources/specialists/issue/issue-enricher.yaml

  - id: collaboration.agent_centric.team_specialist_roster
    level: agent_centric
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Agent-centric collaboration requires stable multi-role boundaries, not a single generic agent.
    recommended_action: Define a richer team specialist roster with role-specific ownership.
    evidence_hint: resources/specialists/team/*.yaml
    detector:
      type: glob_count
      patterns:
        - resources/specialists/team/*.yaml
      min: 5
  - id: collaboration.agent_centric.kanban_lane_specialists
    level: agent_centric
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Lane-specific specialists show that agents can own substantial workflow slices.
    recommended_action: Add workflow-bound specialists for planning, execution, and review lanes.
    evidence_hint: resources/specialists/workflows/kanban/**/*.yaml
    detector:
      type: glob_count
      patterns:
        - resources/specialists/workflows/kanban/**/*.yaml
      min: 5

  - id: collaboration.agent_first.review_flow_definition
    level: agent_first
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Agent-first delivery needs explicit merge-readiness or review orchestration, not just coding agents.
    recommended_action: Add a checked-in review flow that coordinates multi-step review work.
    evidence_hint: resources/flows/code-review.yaml
    detector:
      type: file_exists
      path: resources/flows/code-review.yaml
  - id: collaboration.agent_first.code_reviewer_role
    level: agent_first
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: A dedicated code-review role is a strong signal that humans are validating leverage instead of hand-performing every review step.
    recommended_action: Add a dedicated code-review specialist with clear ownership.
    evidence_hint: resources/specialists/team/code-reviewer.yaml
    detector:
      type: file_exists
      path: resources/specialists/team/code-reviewer.yaml

  - id: sdlc.awareness.lint_script
    level: awareness
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Awareness-level AI usage should still land inside a basic feedback loop.
    recommended_action: Add a lint script to establish a minimal SDLC baseline.
    evidence_hint: package.json scripts.lint
    detector:
      type: json_path_exists
      path: package.json
      jsonPath: [scripts, lint]
  - id: sdlc.awareness.test_runner
    level: awareness
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Even early AI usage should be anchored to an executable validation command.
    recommended_action: Add a repository test runner command.
    evidence_hint: package.json scripts.test:run
    detector:
      type: json_path_exists
      path: package.json
      jsonPath: [scripts, "test:run"]

  - id: sdlc.assisted.unit_test_evidence
    level: assisted_coding
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Assisted coding should already include unit-test evidence rather than relying on manual checking.
    recommended_action: Add or maintain an executable unit-test evidence file.
    evidence_hint: docs/fitness/unit-test.md
    detector:
      type: file_exists
      path: docs/fitness/unit-test.md
  - id: sdlc.assisted.api_test_evidence
    level: assisted_coding
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Broader SDLC support requires AI-generated work to respect API behaviors as well as code paths.
    recommended_action: Add or maintain API contract evidence.
    evidence_hint: docs/fitness/rust-api-test.md
    detector:
      type: file_exists
      path: docs/fitness/rust-api-test.md

  - id: sdlc.structured_ai_coding.pr_verify_flow
    level: structured_ai_coding
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Structured AI coding should connect implementation to a repeatable validation flow.
    recommended_action: Add a reusable PR verification workflow definition.
    evidence_hint: resources/flows/pr-verify.yaml
    detector:
      type: file_exists
      path: resources/flows/pr-verify.yaml
  - id: sdlc.structured_ai_coding.defense_workflow
    level: structured_ai_coding
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: CI-backed defense workflows turn AI-generated changes into auditable SDLC checkpoints.
    recommended_action: Add CI automation that executes the repository fitness rules.
    evidence_hint: .github/workflows/defense.yaml
    detector:
      type: yaml_path_exists
      path: .github/workflows/defense.yaml
      yamlPath: [jobs]

  - id: sdlc.agent_centric.red_fix_loop
    level: agent_centric
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Agent-centric SDLC maturity shows up when agents handle diagnostics and repair loops, not just feature coding.
    recommended_action: Add a CI red-fix loop or equivalent diagnostic automation.
    evidence_hint: .github/scripts/ci-red-fixer.ts
    detector:
      type: file_exists
      path: .github/scripts/ci-red-fixer.ts
  - id: sdlc.agent_centric.entropy_cleanup_loop
    level: agent_centric
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Non-feature maintenance work is a core signal of agent-centric SDLC coverage.
    recommended_action: Add automated cleanup or repository hygiene workflows.
    evidence_hint: .github/workflows/issue-garbage-collector.yml
    detector:
      type: yaml_path_exists
      path: .github/workflows/issue-garbage-collector.yml
      yamlPath: [jobs]

  - id: sdlc.agent_first.completion_handler
    level: agent_first
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Agent-first SDLC should automate the tail of the loop after implementation finishes.
    recommended_action: Add a completion or submit-preparation handler for agent-generated changes.
    evidence_hint: .github/workflows/copilot-complete.yml
    detector:
      type: yaml_path_exists
      path: .github/workflows/copilot-complete.yml
      yamlPath: [jobs, handle-complete, steps]
  - id: sdlc.agent_first.release_flow
    level: agent_first
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: End-to-end SDLC autonomy is not complete without a submit or release-oriented flow.
    recommended_action: Add a release-ready or submit orchestration flow under resources/flows.
    evidence_hint: resources/flows/release.yaml
    detector:
      type: file_exists
      path: resources/flows/release.yaml

  - id: harness.awareness.acp_runtime_surface
    level: awareness
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: A harness begins when AI execution is exposed as a checked-in system surface.
    recommended_action: Add a runtime integration surface for agent execution.
    evidence_hint: src/core/acp
    detector:
      type: file_exists
      path: src/core/acp
  - id: harness.awareness.cli_runtime_surface
    level: awareness
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Awareness-level harness maturity benefits from a local CLI or server entrypoint.
    recommended_action: Add a local CLI or server runtime entrypoint for agent execution.
    evidence_hint: crates/routa-cli
    detector:
      type: file_exists
      path: crates/routa-cli

  - id: harness.assisted.runtime_manager
    level: assisted_coding
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Assisted harnessing requires a reusable runtime manager instead of ad hoc command launches.
    recommended_action: Add a runtime manager for provider or agent orchestration.
    evidence_hint: src/core/acp/runtime-manager.ts
    detector:
      type: file_exists
      path: src/core/acp/runtime-manager.ts
  - id: harness.assisted.hook_runtime
    level: assisted_coding
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Local feedback loops are part of the harness, not optional polish.
    recommended_action: Add a reusable local hook or validation runtime.
    evidence_hint: tools/hook-runtime/src/cli.ts
    detector:
      type: file_exists
      path: tools/hook-runtime/src/cli.ts

  - id: harness.structured_ai_coding.review_triggers
    level: structured_ai_coding
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Structured harnesses need deterministic escalation signals when AI changes look risky.
    recommended_action: Add review-trigger rules to the fitness rulebook.
    evidence_hint: docs/fitness/review-triggers.yaml
    detector:
      type: file_exists
      path: docs/fitness/review-triggers.yaml
  - id: harness.structured_ai_coding.defense_pipeline
    level: structured_ai_coding
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Structured AI coding should connect local harnessing to CI enforcement.
    recommended_action: Add a defense pipeline that executes fitness checks in CI.
    evidence_hint: .github/workflows/defense.yaml
    detector:
      type: yaml_path_exists
      path: .github/workflows/defense.yaml
      yamlPath: [jobs]

  - id: harness.agent_centric.kanban_execution_queue
    level: agent_centric
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Agent-centric harnesses coordinate work queues rather than relying on single-threaded prompt loops.
    recommended_action: Add a durable task or session queue for agent execution.
    evidence_hint: src/core/kanban/kanban-session-queue.ts
    detector:
      type: file_exists
      path: src/core/kanban/kanban-session-queue.ts
  - id: harness.agent_centric.trace_ui
    level: agent_centric
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Agents need first-class observability artifacts once they own substantial workflow slices.
    recommended_action: Expose agent traces or observability surfaces in the product.
    evidence_hint: src/app/traces/page.tsx
    detector:
      type: file_exists
      path: src/app/traces/page.tsx

  - id: harness.agent_first.red_fix_agent
    level: agent_first
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Agent-first harnesses should react to failing feedback loops with autonomous repair attempts.
    recommended_action: Add an automated red-fix agent or CI failure repair loop.
    evidence_hint: .github/scripts/ci-red-fixer.ts
    detector:
      type: file_exists
      path: .github/scripts/ci-red-fixer.ts
  - id: harness.agent_first.entropy_reducer
    level: agent_first
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: High-throughput harnesses need background cleanup work to keep entropy under control.
    recommended_action: Add a background cleanup or garbage-collection agent workflow.
    evidence_hint: .github/scripts/issue-gc.ts
    detector:
      type: file_exists
      path: .github/scripts/issue-gc.ts

  - id: governance.awareness.contract_visible
    level: awareness
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Governance starts when contributor rules are explicit and reviewable.
    recommended_action: Add a repository operating contract that agents and humans both follow.
    evidence_hint: AGENTS.md
    detector:
      type: file_exists
      path: AGENTS.md
  - id: governance.awareness.lint_config
    level: awareness
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Even baseline governance should include codified style or static checks.
    recommended_action: Add a lint configuration file.
    evidence_hint: eslint.config.mjs
    detector:
      type: file_exists
      path: eslint.config.mjs

  - id: governance.assisted.lint_gate
    level: assisted_coding
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Assisted coding needs basic guardrails that run without human interpretation.
    recommended_action: Add or keep a lint gate in package.json.
    evidence_hint: package.json scripts.lint
    detector:
      type: json_path_exists
      path: package.json
      jsonPath: [scripts, lint]
  - id: governance.assisted.test_gate
    level: assisted_coding
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Test execution is a second baseline governance layer for AI-generated changes.
    recommended_action: Add or keep a test runner script in package.json.
    evidence_hint: package.json scripts.test:run
    detector:
      type: json_path_exists
      path: package.json
      jsonPath: [scripts, "test:run"]

  - id: governance.structured_ai_coding.fitness_rulebook
    level: structured_ai_coding
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Structured AI governance needs a durable rulebook beyond informal reviewer expectations.
    recommended_action: Add a fitness rulebook that defines evidence-driven validation.
    evidence_hint: docs/fitness/README.md
    detector:
      type: file_exists
      path: docs/fitness/README.md
  - id: governance.structured_ai_coding.api_contract
    level: structured_ai_coding
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Contract-first governance prevents AI changes from silently drifting API behavior.
    recommended_action: Add an API contract source of truth.
    evidence_hint: api-contract.yaml
    detector:
      type: file_exists
      path: api-contract.yaml

  - id: governance.agent_centric.entrix_runtime
    level: agent_centric
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Agent-centric systems need architecture-aware guardrails that are stronger than generic lint rules.
    recommended_action: Add or maintain a dedicated governance runtime for repository fitness.
    evidence_hint: tools/entrix
    detector:
      type: file_exists
      path: tools/entrix
  - id: governance.agent_centric.review_trigger_rules
    level: agent_centric
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Tailored risk escalation is a core sign of agent-specific governance.
    recommended_action: Add repository-specific review-trigger rules.
    evidence_hint: docs/fitness/review-triggers.yaml
    detector:
      type: file_exists
      path: docs/fitness/review-triggers.yaml

  - id: governance.agent_first.review_workflow
    level: agent_first
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Agent-first governance needs a coded review workflow, not just implicit human fallback.
    recommended_action: Add a reusable review or merge-readiness flow.
    evidence_hint: resources/flows/code-review.yaml
    detector:
      type: file_exists
      path: resources/flows/code-review.yaml
  - id: governance.agent_first.review_specialists
    level: agent_first
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Multiple specialized reviewers show that review work itself has been operationalized for agents.
    recommended_action: Add a richer review specialist roster.
    evidence_hint: resources/specialists/review/*.yaml
    detector:
      type: glob_count
      patterns:
        - resources/specialists/review/*.yaml
      min: 4

  - id: context.awareness.architecture_map
    level: awareness
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Durable context starts with an explicit architecture map that survives any single session.
    recommended_action: Add a canonical architecture overview document.
    evidence_hint: docs/ARCHITECTURE.md
    detector:
      type: file_exists
      path: docs/ARCHITECTURE.md
  - id: context.awareness.feature_tree
    level: awareness
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Route and endpoint discovery should be repo-native instead of depending on tribal memory.
    recommended_action: Add an auto-generated product or API feature index.
    evidence_hint: docs/product-specs/FEATURE_TREE.md
    detector:
      type: file_exists
      path: docs/product-specs/FEATURE_TREE.md

  - id: context.assisted.refactor_playbook
    level: assisted_coding
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Assisted coding improves when the repo documents how to split and reason about large changes.
    recommended_action: Add a refactor or long-file triage playbook.
    evidence_hint: docs/REFACTOR.md
    detector:
      type: file_exists
      path: docs/REFACTOR.md
  - id: context.assisted.reference_library
    level: assisted_coding
    dimension: context
    weight: 1
    critical: false
    why_it_matters: A shared reference library helps agents stay anchored to durable project knowledge.
    recommended_action: Add a repository references area for frequently used guidance.
    evidence_hint: docs/references/README.md
    detector:
      type: file_exists
      path: docs/references/README.md

  - id: context.structured_ai_coding.issue_history
    level: structured_ai_coding
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Structured AI coding benefits from searchable local issue and incident history.
    recommended_action: Keep a sizable local issue history under docs/issues.
    evidence_hint: docs/issues/*.md
    detector:
      type: glob_count
      patterns:
        - docs/issues/*.md
      min: 20
  - id: context.structured_ai_coding.issue_sync
    level: structured_ai_coding
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Syncing external issue context into the repo makes retrieval repeatable for agents.
    recommended_action: Add a GitHub issue sync script or equivalent ingestion pipeline.
    evidence_hint: .github/scripts/sync-github-issues.ts
    detector:
      type: file_exists
      path: .github/scripts/sync-github-issues.ts

  - id: context.agent_centric.repo_map
    level: agent_centric
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Agent-centric context engineering relies on explicit routing, progressive disclosure, and navigation cues.
    recommended_action: Expand the repository map in AGENTS.md or equivalent routing docs.
    evidence_hint: AGENTS.md
    detector:
      type: file_exists
      path: AGENTS.md
  - id: context.agent_centric.design_docs
    level: agent_centric
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Design-intent documents help agents preserve system boundaries while making substantial changes.
    recommended_action: Add durable design-intent docs under docs/design-docs.
    evidence_hint: docs/design-docs/core-beliefs.md
    detector:
      type: file_exists
      path: docs/design-docs/core-beliefs.md

  - id: context.agent_first.issue_gc_agent
    level: agent_first
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Agent-first context engineering should include self-maintaining knowledge or entropy-reduction loops.
    recommended_action: Add a background issue or knowledge cleanup agent.
    evidence_hint: .github/scripts/issue-gc.ts
    detector:
      type: file_exists
      path: .github/scripts/issue-gc.ts
  - id: context.agent_first.issue_gc_workflow
    level: agent_first
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Context maintenance should be automated on a schedule, not left entirely to manual cleanup.
    recommended_action: Add a scheduled workflow that maintains repository issue knowledge.
    evidence_hint: .github/workflows/issue-garbage-collector.yml
    detector:
      type: yaml_path_exists
      path: .github/workflows/issue-garbage-collector.yml
      yamlPath: [jobs]
